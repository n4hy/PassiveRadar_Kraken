id: kraken_passive_radar_rspduo_source
label: RSPduo Source
category: '[Kraken Passive Radar]'
flags: [throttle]

documentation: |-
  SDRplay RSPduo Dual-Tuner Source Block

  Dual-channel source using SDRplay RSPduo via gr-sdrplay3 in
  dual-tuner diversity reception mode.
  Provides 2 complex outputs: output 0 = reference, output 1 = surveillance.

  Both tuners share a common clock for coherent operation.

  Hardware capabilities:
    - Frequency: 1 kHz to 2 GHz
    - Sample rate: 62.5 kHz to 2 MHz (dual-tuner mode limit)
    - IF gain: 20 to 59 dB
    - RF gain reduction: 0 to 27 dB
    - Fixed antenna: Both Tuners (dual-tuner mode)
    - Bias-T, RF Notch, DAB Notch, AM Notch filters
    - Bandwidths: 0.2, 0.3, 0.6, 1.536 MHz

parameters:
- id: id
  label: ID
  dtype: id
- id: frequency
  label: Center Frequency
  dtype: float
  default: 100e6
- id: sample_rate
  label: Sample Rate
  dtype: float
  default: 2e6
- id: if_gain
  label: IF Gain (dB)
  dtype: float
  default: 40.0
- id: rf_gain
  label: RF Gain Reduction (dB)
  dtype: float
  default: 0.0
- id: bandwidth
  label: Bandwidth (Hz, 0=auto)
  dtype: float
  default: 0
- id: bias_t
  label: Bias-T
  dtype: bool
  default: 'False'
  options: ['True', 'False']
  option_labels: ['On', 'Off']
  hide: part
- id: rf_notch
  label: RF Notch Filter
  dtype: bool
  default: 'True'
  options: ['True', 'False']
  option_labels: ['On', 'Off']
  hide: part
- id: dab_notch
  label: DAB Notch Filter
  dtype: bool
  default: 'True'
  options: ['True', 'False']
  option_labels: ['On', 'Off']
  hide: part
- id: am_notch
  label: AM Notch Filter
  dtype: bool
  default: 'False'
  options: ['True', 'False']
  option_labels: ['On', 'Off']
  hide: part

inputs: []

outputs:
- label: ref
  domain: stream
  dtype: complex
- label: surv
  domain: stream
  dtype: complex

templates:
  imports: from gnuradio.kraken_passive_radar import rspduo_source
  make: >-
    rspduo_source(frequency=${frequency}, sample_rate=${sample_rate},
    if_gain=${if_gain}, rf_gain=${rf_gain},
    bandwidth=${bandwidth},
    bias_t=${bias_t}, rf_notch=${rf_notch},
    dab_notch=${dab_notch}, am_notch=${am_notch})
  callbacks:
  - set_frequency(${frequency})
  - set_sample_rate(${sample_rate})
  - set_if_gain(${if_gain})
  - set_rf_gain(${rf_gain})
  - set_bandwidth(${bandwidth})

asserts:
  - ${ frequency >= 1e3 and frequency <= 2e9 }
  - ${ sample_rate >= 62500 and sample_rate <= 2e6 }
  - ${ if_gain >= 20 and if_gain <= 59 }
  - ${ rf_gain >= 0 and rf_gain <= 27 }

file_format: 1
