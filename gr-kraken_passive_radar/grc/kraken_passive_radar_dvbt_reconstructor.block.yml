id: kraken_passive_radar_dvbt_reconstructor
label: Multi-Signal Reconstructor (Block B3)
category: '[Kraken Passive Radar]'
flags: [python, cpp]

documentation: |-
  Block B3: Multi-Signal Reference Signal Reconstructor

  Reconstructs a clean reference signal using demodulation-remodulation with
  signal-specific error correction. Provides a "perfect" reference signal for
  passive radar processing, improving sensitivity by 10-20 dB in weak signal
  environments.

  Supported Signal Types:

  - FM Radio (88-108 MHz):
    * Works everywhere in US and worldwide
    * 10-15 dB SNR improvement
    * Low CPU usage (8%)
    * Production ready, no limitations
    * 60+ km range

  - ATSC 3.0 (470-698 MHz):
    * US NextGen TV broadcasts
    * 15-20 dB SNR improvement (strong signals)
    * Better range resolution (25m vs 750m)
    * Higher CPU usage (49%)
    * LDPC FEC is placeholder (works best SNR > 15 dB)
    * Available in major US cities

  - DVB-T (470-862 MHz):
    * European/Australian digital TV
    * Skeleton implementation (TODO)
    * Use FM as fallback

  - Passthrough:
    * No processing
    * Use for baseline comparison

  Expected Performance:
  - CAF peak improvement: 10-20 dB
  - Detection range: +30-50%
  - False alarm rate: Significantly reduced

  Recommendation: Start with FM mode for production use.

parameters:
  - id: signal_type
    label: Signal Type
    dtype: string
    default: '"passthrough"'
    options: ['"passthrough"', '"fm"', '"atsc3"', '"dvbt"']
    option_labels: ['Passthrough (No Processing)', 'FM Radio (88-108 MHz)', 'ATSC 3.0 (US NextGen TV)', 'DVB-T (Europe/Australia)']
    hide: none

  - id: fm_deviation
    label: FM Deviation (Hz)
    dtype: float
    default: '75e3'
    hide: ${ 'part' if signal_type == '"fm"' else 'all' }

  - id: enable_stereo
    label: Enable Stereo (FM)
    dtype: bool
    default: 'True'
    hide: ${ 'part' if signal_type == '"fm"' else 'all' }
    options: ['True', 'False']
    option_labels: ['Yes', 'No']

  - id: enable_pilot_regen
    label: Regenerate 19 kHz Pilot (FM)
    dtype: bool
    default: 'True'
    hide: ${ 'part' if signal_type == '"fm"' else 'all' }
    options: ['True', 'False']
    option_labels: ['Yes', 'No']

  - id: audio_bw
    label: Audio Bandwidth (Hz)
    dtype: float
    default: '15e3'
    hide: ${ 'part' if signal_type == '"fm"' else 'all' }

  - id: fft_size
    label: OFDM FFT Size
    dtype: int
    default: '8192'
    options: ['2048', '4096', '8192', '16384', '32768']
    option_labels: ['2K', '4K', '8K (ATSC common)', '16K', '32K']
    hide: ${ 'part' if signal_type in ['"atsc3"', '"dvbt"'] else 'all' }

  - id: guard_interval
    label: Guard Interval (samples)
    dtype: int
    default: '192'
    hide: ${ 'part' if signal_type in ['"atsc3"', '"dvbt"'] else 'all' }

  - id: constellation
    label: Constellation (DVB-T)
    dtype: int
    default: '2'
    options: ['0', '1', '2']
    option_labels: ['QPSK', '16-QAM', '64-QAM']
    hide: ${ 'part' if signal_type == '"dvbt"' else 'all' }

  - id: code_rate
    label: Code Rate (DVB-T)
    dtype: int
    default: '2'
    options: ['0', '1', '2', '3', '4']
    option_labels: ['1/2', '2/3', '3/4', '5/6', '7/8']
    hide: ${ 'part' if signal_type == '"dvbt"' else 'all' }

  - id: pilot_pattern
    label: Pilot Pattern (ATSC 3.0)
    dtype: int
    default: '0'
    hide: ${ 'part' if signal_type == '"atsc3"' else 'all' }

  - id: enable_svd
    label: Enable SVD Pilot Enhancement
    dtype: bool
    default: 'True'
    hide: ${ 'part' if signal_type in ['"atsc3"', '"dvbt"'] else 'all' }
    options: ['True', 'False']
    option_labels: ['Yes', 'No']

inputs:
  - domain: stream
    dtype: complex
    label: in

outputs:
  - domain: stream
    dtype: complex
    label: out

templates:
  imports: from gnuradio import kraken_passive_radar
  make: |
    kraken_passive_radar.dvbt_reconstructor.make(
        signal_type=${signal_type},
        fm_deviation=${fm_deviation},
        enable_stereo=${enable_stereo},
        enable_pilot_regen=${enable_pilot_regen},
        audio_bw=${audio_bw},
        fft_size=${fft_size},
        guard_interval=${guard_interval},
        constellation=${constellation},
        code_rate=${code_rate},
        pilot_pattern=${pilot_pattern},
        enable_svd=${enable_svd}
    )
  callbacks:
    - set_enable_svd(${enable_svd})
    - set_enable_pilot_regen(${enable_pilot_regen})
    - set_signal_type(${signal_type})

file_format: 1
