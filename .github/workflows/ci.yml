name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kernels:
    name: Build C++ Kernels & Run Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libfftw3-dev libeigen3-dev \
            python3-dev python3-numpy python3-pytest

      - name: Build kernels (out-of-source)
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_OOT_MODULE=OFF
          make -j$(nproc)

      - name: Verify kernel libraries
        run: |
          ls -la build/lib/libkraken_*.so
          # Verify all 10 libraries exist
          test -f build/lib/libkraken_eca_b_clutter_canceller.so
          test -f build/lib/libkraken_conditioning.so
          test -f build/lib/libkraken_fftw_init.so
          test -f build/lib/libkraken_time_alignment.so
          test -f build/lib/libkraken_caf_processing.so
          test -f build/lib/libkraken_doppler_processing.so
          test -f build/lib/libkraken_backend.so
          test -f build/lib/libkraken_aoa_processing.so
          test -f build/lib/libkraken_resampler.so
          test -f build/lib/libkraken_nlms_clutter_canceller.so

      - name: Run kernel unit tests
        run: |
          python3 -m pytest tests/ \
            --ignore=tests/test_end_to_end.py \
            --ignore=tests/test_krakensdr_source.py \
            --ignore=tests/test_gr_cpp_blocks.py \
            -v --tb=short -x

  oot-module:
    name: Build OOT Module
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GNU Radio and dependencies
        run: |
          sudo add-apt-repository -y ppa:gnuradio/gnuradio-releases
          sudo apt-get update
          sudo apt-get install -y \
            gnuradio-dev libvolk2-dev \
            libfftw3-dev \
            python3-dev pybind11-dev \
            build-essential cmake pkg-config

      - name: Build OOT module
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Install OOT module
        run: |
          cd build
          sudo make install
          sudo ldconfig

      - name: Run C++ block tests
        run: |
          python3 -m pytest tests/test_gr_cpp_blocks.py -v --tb=short

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Python tools
        run: pip install flake8

      - name: Lint Python code
        run: |
          flake8 kraken_passive_radar/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --count --show-source --statistics || true
          flake8 gr-kraken_passive_radar/python/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --count --show-source --statistics || true
